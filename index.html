<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI API Tester</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 1.6rem; font-weight: 600; letter-spacing: -0.02em; }
    header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.4rem; }

    .actions {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .btn {
      padding: 0.55rem 1.25rem;
      border-radius: 8px;
      border: none;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-primary   { background: #fff; color: #000; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: border-color 0.25s;
    }
    .card.success { border-color: #10b98140; }
    .card.failure { border-color: #ef444440; }
    .card.testing { border-color: #f59e0b40; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .provider-info { display: flex; align-items: center; gap: 0.65rem; }

    .icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 700;
      flex-shrink: 0;
    }
    .icon-claude { background: #d9770620; color: #d97706; }
    .icon-openai { background: #10b98120; color: #10b981; }
    .icon-gemini { background: #4f8ef720; color: #4f8ef7; }
    .icon-ollama { background: #a78bfa20; color: #a78bfa; }

    .provider-name { font-weight: 600; font-size: 0.95rem; }
    .provider-sub  { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    .status-wrap { display: flex; align-items: center; gap: 0.4rem; }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #333;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .dot.ok      { background: #10b981; box-shadow: 0 0 6px #10b98180; }
    .dot.fail    { background: #ef4444; box-shadow: 0 0 6px #ef444480; }
    .dot.pending { background: #f59e0b; animation: blink 0.9s ease-in-out infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .latency { font-size: 0.75rem; color: var(--muted); font-variant-numeric: tabular-nums; }

    .field-group { display: flex; flex-direction: column; gap: 0.35rem; }
    label { font-size: 0.78rem; color: var(--muted); }

    input[type="password"], input[type="text"] {
      background: #0d0d0d;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      padding: 0.5rem 0.65rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      font-family: 'Courier New', monospace;
    }
    input:focus { border-color: #555; }

    .row { display: flex; gap: 0.5rem; }
    .row .field-group:first-child { flex: 2; }
    .row .field-group:last-child  { flex: 1; }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .detail {
      font-size: 0.78rem;
      color: var(--muted);
      min-height: 1rem;
      word-break: break-word;
      flex: 1;
    }
    .detail.ok   { color: #10b981; }
    .detail.fail { color: #ef4444; }

    .btn-test {
      padding: 0.45rem 0.9rem;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-test:hover:not(:disabled) { background: #222; }
    .btn-test:disabled { opacity: 0.4; cursor: not-allowed; }

    .ollama-hint {
      font-size: 0.72rem;
      color: #555;
      line-height: 1.5;
    }
    .ollama-hint code {
      font-family: 'Courier New', monospace;
      color: #a78bfa;
      background: #a78bfa10;
      padding: 0.1rem 0.3rem;
      border-radius: 3px;
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.78rem;
      color: #333;
    }
  </style>
</head>
<body>

<header>
  <h1>AI API Tester</h1>
  <p>Check connectivity and key validity for AI providers</p>
</header>

<div class="actions">
  <button class="btn btn-primary"   id="testAll">Test All</button>
  <button class="btn btn-secondary" id="clearAll">Clear</button>
</div>

<div class="grid" id="grid"></div>

<footer>Keys are saved in your browser's local storage and never sent anywhere else</footer>

<script>
const STORAGE_KEY = 'ai-api-tester-keys';

const PROVIDERS = [
  {
    id: 'claude',
    name: 'Claude',
    sub: 'Anthropic · Haiku',
    icon: '✦',
    iconClass: 'icon-claude',
    fields: [{ id: 'apiKey', label: 'API Key', placeholder: 'sk-ant-…', type: 'password' }],
  },
  {
    id: 'openai',
    name: 'OpenAI',
    sub: 'GPT-4o mini',
    icon: '◎',
    iconClass: 'icon-openai',
    fields: [{ id: 'apiKey', label: 'API Key', placeholder: 'sk-…', type: 'password' }],
  },
  {
    id: 'gemini',
    name: 'Gemini',
    sub: 'Google · 2.0 Flash',
    icon: '✦',
    iconClass: 'icon-gemini',
    fields: [{ id: 'apiKey', label: 'API Key', placeholder: 'AIza…', type: 'password' }],
  },
  {
    id: 'ollama',
    name: 'Ollama',
    sub: 'Local',
    icon: '◈',
    iconClass: 'icon-ollama',
    fields: [
      { id: 'host', label: 'Host', placeholder: 'localhost', type: 'text', default: 'localhost' },
      { id: 'port', label: 'Port', placeholder: '11434', type: 'text', default: '11434', row: true },
    ],
    hint: true,
  },
];

// ── API helpers ──────────────────────────────────────────────────────────────

async function ping(url, options = {}) {
  const start = Date.now();
  try {
    const res = await fetch(url, { signal: AbortSignal.timeout(10000), ...options });
    const latency = Date.now() - start;
    let data = null;
    try { data = await res.json(); } catch { /* non-JSON body */ }
    return { ok: res.ok, status: res.status, latency, data };
  } catch (err) {
    return { ok: false, status: 0, latency: Date.now() - start, data: null, networkError: err.message };
  }
}

const TESTS = {
  claude: async ({ apiKey }) => {
    if (!apiKey) return fail(0, 'No API key provided');
    const r = await ping('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'content-type': 'application/json' },
      body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 1, messages: [{ role: 'user', content: 'hi' }] }),
    });
    if (r.networkError) return fail(r.latency, 'Network error — check CORS or connectivity');
    if (r.ok) return ok(r.latency, 'API key valid');
    return fail(r.latency, r.data?.error?.message || `HTTP ${r.status}`);
  },

  openai: async ({ apiKey }) => {
    if (!apiKey) return fail(0, 'No API key provided');
    const r = await ping('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}`, 'content-type': 'application/json' },
      body: JSON.stringify({ model: 'gpt-4o-mini', max_tokens: 1, messages: [{ role: 'user', content: 'hi' }] }),
    });
    if (r.networkError) return fail(r.latency, 'Network error — check CORS or connectivity');
    if (r.ok) return ok(r.latency, 'API key valid');
    return fail(r.latency, r.data?.error?.message || `HTTP ${r.status}`);
  },

  gemini: async ({ apiKey }) => {
    if (!apiKey) return fail(0, 'No API key provided');
    const r = await ping(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(apiKey)}`, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: 'hi' }] }], generationConfig: { maxOutputTokens: 1 } }),
    });
    if (r.networkError) return fail(r.latency, 'Network error — check CORS or connectivity');
    if (r.ok) return ok(r.latency, 'API key valid');
    return fail(r.latency, r.data?.error?.message || `HTTP ${r.status}`);
  },

  ollama: async ({ host, port }) => {
    host = host || 'localhost';
    port = port || '11434';
    const r = await ping(`http://${host}:${port}/api/tags`);
    if (r.networkError) return fail(r.latency, 'Not reachable — is Ollama running? See hint below.');
    if (!r.ok) return fail(r.latency, `HTTP ${r.status}`);
    const models = (r.data?.models || []).map(m => m.name);
    const detail = models.length
      ? `${models.length} model(s): ${models.slice(0, 3).join(', ')}${models.length > 3 ? '…' : ''}`
      : 'Running — no models installed';
    return ok(r.latency, detail);
  },
};

const ok   = (latency, detail) => ({ ok: true,  latency, detail });
const fail = (latency, detail) => ({ ok: false, latency, detail });

// ── Storage ──────────────────────────────────────────────────────────────────

function loadKeys() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; }
}

function saveKey(providerId, fieldId, value) {
  const keys = loadKeys();
  if (!keys[providerId]) keys[providerId] = {};
  keys[providerId][fieldId] = value;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(keys));
}

function clearKeys() {
  localStorage.removeItem(STORAGE_KEY);
}

// ── UI ───────────────────────────────────────────────────────────────────────

const savedKeys = loadKeys();

PROVIDERS.forEach(p => {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = `card-${p.id}`;

  let fieldsHTML = '';
  const fields = p.fields || [];

  if (fields.some(f => f.row)) {
    const [first, ...rest] = fields;
    fieldsHTML += `<div class="field-group"><label>${first.label}</label><input type="${first.type}" id="${p.id}-${first.id}" placeholder="${first.placeholder}" value="${savedKeys[p.id]?.[first.id] ?? first.default ?? ''}"></div>`;
    if (rest.length) {
      fieldsHTML = `<div class="row">${fieldsHTML}` + rest.map(f =>
        `<div class="field-group"><label>${f.label}</label><input type="${f.type}" id="${p.id}-${f.id}" placeholder="${f.placeholder}" value="${savedKeys[p.id]?.[f.id] ?? f.default ?? ''}"></div>`
      ).join('') + `</div>`;
    }
  } else {
    fieldsHTML = fields.map(f =>
      `<div class="field-group"><label>${f.label}</label><input type="${f.type}" id="${p.id}-${f.id}" placeholder="${f.placeholder}" value="${savedKeys[p.id]?.[f.id] ?? ''}"></div>`
    ).join('');
  }

  const hintHTML = p.hint
    ? `<div class="ollama-hint" id="hint-${p.id}" style="display:none">
        If testing from a remote URL, restart Ollama with:<br>
        <code>OLLAMA_ORIGINS=${window.location.origin} ollama serve</code>
      </div>`
    : '';

  card.innerHTML = `
    <div class="card-header">
      <div class="provider-info">
        <div class="icon ${p.iconClass}">${p.icon}</div>
        <div>
          <div class="provider-name">${p.name}</div>
          <div class="provider-sub">${p.sub}</div>
        </div>
      </div>
      <div class="status-wrap">
        <span class="dot" id="dot-${p.id}"></span>
        <span class="latency" id="lat-${p.id}"></span>
      </div>
    </div>
    ${fieldsHTML}
    ${hintHTML}
    <div class="footer-row">
      <span class="detail" id="det-${p.id}">—</span>
      <button class="btn-test" id="btn-${p.id}" onclick="runTest('${p.id}')">Test</button>
    </div>
  `;

  document.getElementById('grid').appendChild(card);

  // Save on input
  (p.fields || []).forEach(f => {
    const el = document.getElementById(`${p.id}-${f.id}`);
    if (el) el.addEventListener('input', () => saveKey(p.id, f.id, el.value));
  });

  // Enter to test
  const first = p.fields?.[0];
  if (first) {
    const el = document.getElementById(`${p.id}-${first.id}`);
    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') runTest(p.id); });
  }
});

async function runTest(id) {
  const card = document.getElementById(`card-${id}`);
  const dot  = document.getElementById(`dot-${id}`);
  const det  = document.getElementById(`det-${id}`);
  const lat  = document.getElementById(`lat-${id}`);
  const btn  = document.getElementById(`btn-${id}`);
  const hint = document.getElementById(`hint-${id}`);

  dot.className = 'dot pending';
  det.className = 'detail';
  det.textContent = 'Testing…';
  lat.textContent = '';
  btn.disabled = true;
  card.className = 'card testing';
  if (hint) hint.style.display = 'none';

  const p = PROVIDERS.find(x => x.id === id);
  const params = {};
  (p.fields || []).forEach(f => {
    const el = document.getElementById(`${p.id}-${f.id}`);
    if (el) params[f.id] = el.value.trim();
  });

  const result = await TESTS[id](params);

  if (result.ok) {
    dot.className = 'dot ok';
    det.className = 'detail ok';
    card.className = 'card success';
  } else {
    dot.className = 'dot fail';
    det.className = 'detail fail';
    card.className = 'card failure';
    if (hint && result.detail.includes('hint')) hint.style.display = 'block';
  }

  det.textContent = result.detail;
  lat.textContent = result.latency ? `${result.latency}ms` : '';
  btn.disabled = false;
}

document.getElementById('testAll').addEventListener('click', () => {
  PROVIDERS.forEach(p => runTest(p.id));
});

document.getElementById('clearAll').addEventListener('click', () => {
  clearKeys();
  PROVIDERS.forEach(p => {
    (p.fields || []).forEach(f => {
      const el = document.getElementById(`${p.id}-${f.id}`);
      if (el && f.type === 'password') el.value = '';
    });
    document.getElementById(`dot-${p.id}`).className = 'dot';
    document.getElementById(`det-${p.id}`).className = 'detail';
    document.getElementById(`det-${p.id}`).textContent = '—';
    document.getElementById(`lat-${p.id}`).textContent = '';
    document.getElementById(`card-${p.id}`).className = 'card';
    const hint = document.getElementById(`hint-${p.id}`);
    if (hint) hint.style.display = 'none';
  });
});
</script>
</body>
</html>
